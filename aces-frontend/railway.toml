# Railway deployment configuration for the ACES frontend SPA.
# Uses Nixpacks to build the Vite app, then serves the static dist/ folder
# with the `serve` package in SPA mode (all routes fall back to index.html).

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm run build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
